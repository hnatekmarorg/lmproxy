apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lm-proxy.fullname" . }}
data:
  config.yaml: |
    server:
      port: {{ .Values.config.server.port }}
    logging:
      level: {{ .Values.config.logging.level }}
      format: {{ .Values.config.logging.format }}
    endpoints:
      {{- toYaml .Values.config.endpoints | nindent 6 }}
