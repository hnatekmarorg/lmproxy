server:
  port: 9090
  # max_request_body_size: 104857600  # Optional: max request body size in bytes (default: 100MB)
  # Set to 0 for no limit (not recommended for production)
  # timeout: 3600  # Optional: request timeout in seconds (default: 3600 = 1 hour)
  # Supports 260K context + long generations with speed degradation

logging:
  level: info  # debug, info, warn, error
  format: text # text or json

endpoints:
  - host: https://your-llm-server.com
    models:
      # Model variant 1 - with thinking/reasoning mode
      - id: model-name-thinking
        path: /model-thinking
        body:
          model: model-name
          temperature: 0.6
          top_p: 0.95
          top_k: 20
          stream: true
          repetition_penalty: 1.0
        chat_template_kwargs:
          enable_thinking: true
          min_p: 0.0

      # Model variant 2 - fast response mode
      - id: model-name-fast
        path: /model-fast
        body:
          model: model-name
          temperature: 0.7
          top_p: 0.8
          top_k: 20
          stream: true
          presence_penalty: 0.0
          frequency_penalty: 0.0
          repetition_penalty: 1.0
        chat_template_kwargs:
          enable_thinking: false
          min_p: 0.0
