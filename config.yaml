server:
  # Proxy bind address (default: "0.0.0.0")
  host: "0.0.0.0"
  # Proxy listen port (default: 8080)
  port: 9090
  # Maximum request body size in bytes (default: 100MB)
  # max_request_body_size: 104857600
  # Request timeout in seconds (default: 3600 = 1 hour)
  # timeout: 3600

logging:
  level: info   # debug, info, warn, error
  format: text  # text, json

endpoints:
  # --- Primary LLM Endpoint ---
  - host: https://your-llm-server.com
    models:
      # Reasoning/thinking model variant
      - id: model-thinking
        path: /model-thinking
        body:
          model: model-name
          temperature: 0.6
          top_p: 0.95
          top_k: 20
          max_tokens: 8192
          stream: true
          repetition_penalty: 1.0
        chat_template_kwargs:
          enable_thinking: true
          min_p: 0.0

      # Fast-response model variant (no thinking)
      - id: model-fast
        path: /model-fast
        body:
          model: model-name
          temperature: 0.7
          top_p: 0.8
          top_k: 20
          max_tokens: 4096
          stream: true
          repetition_penalty: 1.0
        chat_template_kwargs:
          enable_thinking: false
          min_p: 0.0

  # --- Local Development Endpoint ---
