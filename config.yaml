server:
  port: 9090

endpoints:
  - host: https://your-llm-server.com
    models:
      # Model variant 1 - with thinking/reasoning mode
      - id: model-name-thinking
        path: /model-thinking
        body:
          model: model-name
          temperature: 0.6
          top_p: 0.95
          top_k: 20
          stream: true
          repetition_penalty: 1.0
        chat_template_kwargs:
          enable_thinking: true
          min_p: 0.0

      # Model variant 2 - fast response mode
      - id: model-name-fast
        path: /model-fast
        body:
          model: model-name
          temperature: 0.7
          top_p: 0.8
          top_k: 20
          stream: true
          presence_penalty: 0.0
          frequency_penalty: 0.0
          repetition_penalty: 1.0
        chat_template_kwargs:
          enable_thinking: false
          min_p: 0.0
